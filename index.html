<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MooreFinance</title>
    <link rel="icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MooreFinance" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        if ('serviceWorker' in navigator) {
          const isDev = window.location.hostname === 'localhost' || 
                        window.location.hostname === '127.0.0.1' || 
                        window.location.port !== '';

          if (isDev) {
            // Unregister any existing service worker in development to avoid caching issues
            navigator.serviceWorker.getRegistrations().then((registrations) => {
              for (const registration of registrations) {
                registration.unregister();
                console.log('SW: Unregistered for development');
              }
            });
          } else {
            // Register service worker in production
            window.addEventListener('load', () => {
              navigator.serviceWorker.register('/sw.js').then((registration) => {
                console.log('SW: Status OK - Scope: ', registration.scope);
                
                setInterval(() => {
                  registration.update();
                }, 1000 * 60 * 5);

                registration.onupdatefound = () => {
                  const installingWorker = registration.installing;
                  if (installingWorker == null) return;
                  
                  installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed') {
                      if (navigator.serviceWorker.controller) {
                        console.log('SW: New version found, reloading...');
                        window.location.reload();
                      }
                    }
                  };
                };
              }).catch((err) => {
                console.error('SW: Registration failed: ', err);
              });
            });

            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
              if (!refreshing) {
                window.location.reload();
                refreshing = true;
              }
            });
          }
        }
      })();
    </script>
  </body>
</html>
